            id(update_ac_slot_display).execute();

# ── LVGL UI ───────────────────────────────────────────────────
# Rotation 270° → canvas is 320×240 landscape.
# Three pages cycle continuously via g_screen_idx / g_screen_secs.
#
# Color palette:
#   0xFFFFFF  White   — labels, units
#   0x888888  Grey    — title labels, static icons
#   0x00FF00  Green   — good / high / charging well
#   0x0096FF  Blue    — medium
#   0xFFFF00  Yellow  — caution / idle / moderate
#   0xFFA500  Orange  — alert / discharging / low
#
# Row geometry (Screens 1 & 2): 3 rows of 320×80 each.
#   Container align=CENTER, y=−80/0/+80 → tops at y=0/80/160.
#   Icon: align=CENTER x=−120 (page centre x≈40).
#   Content: align=CENTER x=+35 (page centre x=195); title y=−30, value y=+7.
#   Units embedded in value strings — no separate unit label.
#   DC page exceptions: Row 2 container height=240 (battery icon backdrop), Row 3 container x=+31 (no icon).
lvgl:
  displays:
    - lcd_display
  buffer_size: 10%
  rotation: 270
  pages:

    # ════════════════════════════════════════════════════════════
    # Screen 0 — Analog Clock (full 320×240, no digital time)
    # ════════════════════════════════════════════════════════════
    - id: clock_page
      bg_color: 0x000000
      bg_opa: COVER
      scrollable: false
      widgets:

        # ── Clock face: LVGL meter widget ─────────────────────
        # Three scales, all range 0–60 / angle_range 360 / rotation=270:
        #   Scale 1: 61 minute ticks + hour hand/tail + minute hand/tail
        #   Scale 2: 13 bold hour-mark ticks (no indicators)
        #   Scale 3: invisible ticks + second hand/tail (drawn last, always on top)
        - meter:
            id: analog_clock
            align: CENTER
            width: 265
            height: 265
            bg_opa: TRANSP
            border_width: 0
            scales:
              # ── Scale 1: Minute ticks + hour & minute hands ──────────────────
              - range_from: 0
                range_to: 60
                angle_range: 360
                rotation: 270
                ticks:
                  count: 61
                  length: 15
                  width: 2
                  color: 0x666666
                indicators:
                  # Hour hand — short, thick, white
                  - line:
                      id: clock_hour_hand
                      width: 12
                      color: 0xFFFFFF
                      length: 60
                      value: 0
                  # Hour tail — counterweight behind pivot
                  - line:
                      id: clock_hour_tail
                      width: 12
                      color: 0xFFFFFF
                      length: 15
                      value: 0
                  # Minute hand — long, medium, white
                  - line:
                      id: clock_min_hand
                      width: 10
                      color: 0xFFFFFF
                      length: 115
                      value: 0
                  # Minute tail — counterweight behind pivot
                  - line:
                      id: clock_min_tail
                      width: 10
                      color: 0xFFFFFF
                      length: 20
                      value: 0
              # ── Scale 2: Bold hour-position tick marks ────────────────────────
              # range 0–12 with count=13 places 12 distinct marks
              # at the exact same angular positions as range 0–60 / stride 5.
              # No major: section → no labels drawn.
              - range_from: 0
                range_to: 12
                angle_range: 360
                rotation: 270
                ticks:
                  count: 13
                  length: 20
                  width: 5
                  color: 0xAAAAAA
              # ── Scale 3: Second hand + tail — drawn last, always on top ──────
              - range_from: 0
                range_to: 60
                angle_range: 360
                rotation: 270
                ticks:
                  count: 2
                  length: 1
                  width: 1
                  color: 0x000000
                indicators:
                  # Second hand — full length, thin, red
                  - line:
                      id: clock_sec_hand
                      width: 5
                      color: 0xFF4040
                      length: 115
                      value: 0
                  # Second tail — counterweight behind pivot
                  - line:
                      id: clock_sec_tail
                      width: 5
                      color: 0xFF4040
                      length: 25
                      value: 0

        # ── Cardinal hour labels (12 / 3 / 6 / 9) ─────────────
        # Positioned at radius 85 px from page centre (160, 120).
        - label:
            text: "12"
            text_font: clock_num_font
            text_color: 0xFFFFFF
            align: CENTER
            y: -85
        - label:
            text: "3"
            text_font: clock_num_font
            text_color: 0xFFFFFF
            align: CENTER
            x: 85
        - label:
            text: "6"
            text_font: clock_num_font
            text_color: 0xFFFFFF
            align: CENTER
            y: 85
        - label:
            text: "9"
            text_font: clock_num_font
            text_color: 0xFFFFFF
            align: CENTER
            x: -85

        # ── Center pivot dot (red) ──────────────────────────────
        - obj:
            align: CENTER
            width: 12
            height: 12
            border_width: 0
            radius: 6
            bg_color: 0xFF0000
            bg_opa: COVER

    # ════════════════════════════════════════════════════════════
    # Screen 1 — DC Page (3 vertical rows, 320×80 each)
    #   Row 1: PV Power
    #   Row 2: Battery SOC
    #   Row 3: Battery Power / Time estimate (cycling)
    # ════════════════════════════════════════════════════════════
    - id: dc_page
      bg_color: 0x000000
      bg_opa: COVER
      scrollable: false
      widgets:
        
        # ── Row dividers ──────────────────────────────────────
        - line:
            points:
              - 0, 0
              - 320, 0
            line_color: 0x333333
            line_width: 1
        - line:
            points:
              - 0, 80
              - 320, 80
            line_color: 0x333333
            line_width: 1
        - line:
            points:
              - 0, 239
              - 320, 239
            line_color: 0x333333
            line_width: 1
        - line:
            points:
              - 0, 1
              - 0, 240
            line_color: 0x333333
            line_width: 1
        - line:
            points:
              - 319, 0
              - 319, 240
            line_color: 0x333333
            line_width: 1
        
        # ── Row 1: PV Power (top, y=0–80) ────────────────────
        - obj:
            width: 320
            height: 80
            align: CENTER
            y: -80
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              # Solar / moon icon (animated by update_solar_icon_state + 250ms interval)
              - label:
                  id: icon_solar
                  text: "\uec0f"
                  text_font: icon_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: -120
              - label:
                  id: icon_solar_moon
                  text: "\uf174"
                  text_font: icon_font_moon
                  text_color: 0x0096FF
                  align: CENTER
                  x: -120
                  hidden: true
              - label:
                  text: "PV Power"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: 35
                  y: -30
              - label:
                  id: val_solar
                  text: "8.88W"
                  text_font: value_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: 35
                  y: 7

        # ── Row 2: Battery SOC (full-height background; large 150px icon
        #    centred at y=40 from page-centre spans rows 2–3 as a visual backdrop)
        - obj:
            width: 320
            height: 200
            align: CENTER
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              # Battery icon — animated by update_batt_icon_state + 250ms interval
              - label:
                  id: icon_battery
                  text: "\ue1a4"
                  text_font: icon_font_batt
                  text_color: 0x00FF00
                  align: CENTER
                  x: -130
                  y: 38
              - label:
                  text: "Battery SOC"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: 35
                  y: -30
              - label:
                  id: val_battery
                  text: "88.8%"
                  text_font: value_font
                  text_color: 0x0096FF
                  align: CENTER
                  x: 35
                  y: 7

        # ── Row 3: Battery Power / Time estimate (bottom, y=160–240) ─
        # Container has x=+30 offset (aligns content under val_battery above; no icon in this row).
        # Title and value both centered within container — content changes with batt_slot cycling.
        - obj:
            width: 320
            height: 80
            align: CENTER
            y: 80
            x: 30
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              - label:
                  id: lbl_batt_title
                  text: "Battery Power"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  y: -30
              - label:
                  id: val_battery_power
                  text: "8.88W"
                  text_font: value_font
                  text_color: 0xFFFF00
                  align: CENTER
                  y: 7

    # ════════════════════════════════════════════════════════════
    # Screen 2 — AC Page (3 vertical rows, 320×80 each)
    #   Row 1: Apparent Power
    #   Row 2: Ecoflow / Load 1 (fixed)
    #   Row 3: A/C 1F ↔ A/C 3F (cycling)
    # ════════════════════════════════════════════════════════════
    - id: ac_page
      bg_color: 0x000000
      bg_opa: COVER
      scrollable: false
      widgets:

        # ── Row dividers ──────────────────────────────────────
        - line:
            points:
              - 0, 0
              - 320, 0
            line_color: 0x333333
            line_width: 1
        - line:
            points:
              - 0, 80
              - 320, 80
            line_color: 0x333333
            line_width: 1
        - line:
            points:
              - 0, 160
              - 320, 160
            line_color: 0x333333
            line_width: 1
        - line:
            points:
              - 0, 239
              - 320, 239
            line_color: 0x333333
            line_width: 1
        - line:
            points:
              - 0, 1
              - 0, 240
            line_color: 0x333333
            line_width: 1
        - line:
            points:
              - 319, 0
              - 319, 240
            line_color: 0x333333
            line_width: 1

        # ── Row 1: Apparent Power (top, y=0–80) ───────────────
        - obj:
            width: 320
            height: 80
            align: CENTER
            y: -80
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              - label:
                  id: icon_home
                  text: "\ue88a"
                  text_font: icon_font
                  text_color: 0x00FF00
                  align: CENTER
                  x: -120
              - label:
                  text: "Apparent Power"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: 35
                  y: -30
              - label:
                  id: val_home
                  text: "8.88kVA"
                  text_font: value_font
                  text_color: 0x00FF00
                  align: CENTER
                  x: 35
                  y: 7

        # ── Row 2: Ecoflow / Load 1 (middle, y=80–160) ────────
        - obj:
            width: 320
            height: 80
            align: CENTER
            y: 0
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              - label:
                  id: icon_ecoflow
                  text: "\ue63c"
                  text_font: icon_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: -120
              - label:
                  id: lbl_load1
                  text: "Ecoflow River 3"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: 35
                  y: -30
              - label:
                  id: val_load1
                  text: "0.00kW"
                  text_font: value_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: 35
                  y: 7

        # ── Row 3: A/C 1F ↔ A/C 3F cycling (bottom, y=160–240)
        - obj:
            width: 320
            height: 80
            align: CENTER
            y: 80
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            scrollable: false
            widgets:
              - label:
                  id: icon_ac_slot
                  text: "\ueb3b"
                  text_font: icon_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: -120
              - label:
                  id: lbl_ac_slot
                  text: "A/C 1st Floor"
                  text_font: label_font
                  text_color: 0x888888
                  align: CENTER
                  x: 35
                  y: -30
              - label:
                  id: val_ac_slot
                  text: "8.88kW"
                  text_font: value_font
                  text_color: 0xFFFF00
                  align: CENTER
                  x: 35
                  y: 7

    # ════════════════════════════════════════════════════════════
    # Doorbell Overlay — triggered by ${doorbell_entity} press
    # Full-screen alert: background flashes random colors every
    # 250 ms for doorbell_duration_secs seconds, then auto-dismisses.
    # Not part of the screen rotation — loaded/unloaded by the
    # ha_doorbell on_value handler and 250ms interval countdown.
    # ════════════════════════════════════════════════════════════
    - id: doorbell_page
      bg_color: 0xFF0000
      bg_opa: COVER
      scrollable: false
      widgets:
        - label:
            text: "DOOR"
            text_font: doorbell_font
            text_color: 0xFFFFFF
            align: CENTER
            y: -55
        - label:
            text: "BELL"
            text_font: doorbell_font
            text_color: 0xFFFFFF
            align: CENTER
            y: 55
