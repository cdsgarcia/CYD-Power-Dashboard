# ── Time ──────────────────────────────────────────────────────
# All PHT times use raw UTC epoch + 8h offset with gmtime_r — bypasses TZ env var.
time:
  - platform: homeassistant
    id: ha_time
    on_time:
      # ── Analog clock hands — update every second ──────────────
      # Uses lvgl.indicator.update (ESPHome native action) rather than the
      # raw lv_meter_set_indicator_value C API, which is not in lambda scope.
      # PHT calculation repeated per call — negligible cost at 1 Hz.
      - seconds: /1
        then:
          - if:
              condition:
                lambda: 'return id(g_lvgl_ready);'
              then:
                - lvgl.indicator.update:
                    id: clock_hour_hand
                    value: !lambda |-
                      auto now = id(ha_time).now();
                      if (!now.is_valid()) return 0;
                      time_t pht = now.timestamp + (8 * 3600);
                      struct tm t; gmtime_r(&pht, &t);
                      return (int)((t.tm_hour % 12) * 5 + t.tm_min / 12);
                - lvgl.indicator.update:
                    id: clock_min_hand
                    value: !lambda |-
                      auto now = id(ha_time).now();
                      if (!now.is_valid()) return 0;
                      time_t pht = now.timestamp + (8 * 3600);
                      struct tm t; gmtime_r(&pht, &t);
                      return t.tm_min;
                - lvgl.indicator.update:
                    id: clock_sec_hand
                    value: !lambda |-
                      auto now = id(ha_time).now();
                      if (!now.is_valid()) return 0;
                      time_t pht = now.timestamp + (8 * 3600);
                      struct tm t; gmtime_r(&pht, &t);
                      return t.tm_sec;
                # Tail indicators — opposite direction (+30 on 0–60 scale = 180°)
                - lvgl.indicator.update:
                    id: clock_hour_tail
                    value: !lambda |-
                      auto now = id(ha_time).now();
                      if (!now.is_valid()) return 0;
                      time_t pht = now.timestamp + (8 * 3600);
                      struct tm t; gmtime_r(&pht, &t);
                      return ((int)((t.tm_hour % 12) * 5 + t.tm_min / 12) + 30) % 60;
                - lvgl.indicator.update:
                    id: clock_min_tail
                    value: !lambda |-
                      auto now = id(ha_time).now();
                      if (!now.is_valid()) return 0;
                      time_t pht = now.timestamp + (8 * 3600);
                      struct tm t; gmtime_r(&pht, &t);
                      return (t.tm_min + 30) % 60;
                - lvgl.indicator.update:
                    id: clock_sec_tail
                    value: !lambda |-
                      auto now = id(ha_time).now();
                      if (!now.is_valid()) return 0;
                      time_t pht = now.timestamp + (8 * 3600);
                      struct tm t; gmtime_r(&pht, &t);
                      return (t.tm_sec + 30) % 60;

      # ── Daily restart check — fires every hour at HH:00:00 ────
      - seconds: 0
        minutes: 0
        then:
          - lambda: |-
              if (!id(daily_restart_enabled).state) return;
              auto now = id(ha_time).now();
              if (!now.is_valid()) return;
              time_t pht = now.timestamp + (8 * 3600);
              struct tm t; gmtime_r(&pht, &t);
              if (t.tm_hour == (int)id(daily_restart_hour).state) {
                ESP_LOGW("restart", "Daily restart at %02d:00 PHT", t.tm_hour);
                App.safe_reboot();
              }

# ── Debug (heap monitoring) ──────────────────────────────────
debug:
  update_interval: 5s

# ── Sensors ──────────────────────────────────────────────────
sensor:
  # ── Heap monitoring ───────────────────────────────────────
  - platform: debug
    free:
      name: "Heap Free"
      id: heap_free
      entity_category: diagnostic
    block:
      name: "Heap Largest Block"
      id: heap_largest_block
      entity_category: diagnostic
    loop_time:
      name: "Loop Time"
      id: heap_loop_time
      entity_category: diagnostic

  # ── WiFi signal ───────────────────────────────────────────
  - platform: wifi_signal
    name: Signal strength
    update_interval: 300s
    accuracy_decimals: 0

  # ── PV Solar power ────────────────────────────────────────
  - platform: homeassistant
    id: ha_solar
    entity_id: ${solar_entity}
    on_value:
      then:
        - lambda: |-
            id(g_solar_val) = x;
            id(update_solar_icon_state).execute();
        - if:
            condition:
              lambda: 'return !id(g_demo_mode);'
            then:
              - lvgl.label.update:
                  id: val_solar
                  text: !lambda |-
                    if (x >= 1000) return str_sprintf("%.2fkW", x / 1000.0f);
                    if (x >= 100)  return str_sprintf("%.0fW", x);
                    if (x >= 10)   return str_sprintf("%.1fW", x);
                    return str_sprintf("%.2fW", x);
                  text_color: !lambda |-
                    if (x > ${solar_color_green})  return lv_color_hex(0x00FF00);
                    if (x > ${solar_color_blue})   return lv_color_hex(0x0096FF);
                    if (x > ${solar_color_yellow}) return lv_color_hex(0xFFFF00);
                    return lv_color_hex(0xFFA500);

  # ── A/C 1F (Load 2 — AC page slot 0) ─────────────────────
  - platform: homeassistant
    id: ha_load2
    entity_id: ${load2_entity}
    on_value:
      then:
        - lambda: |-
            id(g_load2_val) = x;
            if (id(g_ac_slot_idx) == 0)
              id(update_ac_slot_display).execute();

  # ── A/C 3F (Load 3 — AC page slot 1) ─────────────────────
  - platform: homeassistant
    id: ha_load3
    entity_id: ${load3_entity}
    on_value:
      then:
        - lambda: |-
            id(g_load3_val) = x;
            if (id(g_ac_slot_idx) == 1)
              id(update_ac_slot_display).execute();

  # ── Ecoflow / Load 1 (AC page row 2 — always shown) ──────
  - platform: homeassistant
    id: ha_load1
    entity_id: ${load1_entity}
    on_value:
      then:
        - lambda: |-
            id(g_load1_val) = x;
            if (!id(g_lvgl_ready)) return;
            if (id(g_demo_mode)) return;
            lv_color_t clr = (x < ${load1_color_green})  ? lv_color_hex(0x00FF00) :
                             (x < ${load1_color_blue})   ? lv_color_hex(0x0096FF) :
                             (x < ${load1_color_yellow}) ? lv_color_hex(0xFFFF00) : lv_color_hex(0xFFA500);
            lv_obj_set_style_text_color(id(icon_ecoflow), clr, 0);
            lv_obj_set_style_text_color(id(val_load1), clr, 0);
            char buf[16];
            if      (x >= 1000) snprintf(buf, sizeof(buf), "%.2fkW", x / 1000.0f);
            else if (x >= 100)  snprintf(buf, sizeof(buf), "%.0fW", x);
            else if (x >= 10)   snprintf(buf, sizeof(buf), "%.1fW", x);
            else                snprintf(buf, sizeof(buf), "%.2fW", x);
            lv_label_set_text(id(val_load1), buf);

  # ── Apparent power / Home load (AC page row 1) ────────────
  - platform: homeassistant
    id: ha_home
    entity_id: ${home_entity}
    on_value:
      then:
        - lambda: 'id(g_home_val) = x;'
        - if:
            condition:
              lambda: 'return !id(g_demo_mode);'
            then:
              - lvgl.label.update:
                  id: val_home
                  text: !lambda |-
                    if (x >= 1000) return str_sprintf("%.2fkVA", x / 1000.0f);
                    if (x >= 100)  return str_sprintf("%.0fVA", x);
                    if (x >= 10)   return str_sprintf("%.1fVA", x);
                    return str_sprintf("%.2fVA", x);
                  text_color: !lambda |-
                    if (x < ${home_color_green}) return lv_color_hex(0x00FF00);
                    if (x < ${home_color_blue}) return lv_color_hex(0x0096FF);
                    if (x < ${home_color_yellow}) return lv_color_hex(0xFFFF00);
                    return lv_color_hex(0xFFA500);
              - lvgl.label.update:
                  id: icon_home
                  text_color: !lambda |-
                    if (x < ${home_color_green}) return lv_color_hex(0x00FF00);
                    if (x < ${home_color_blue}) return lv_color_hex(0x0096FF);
                    if (x < ${home_color_yellow}) return lv_color_hex(0xFFFF00);
                    return lv_color_hex(0xFFA500);

  # ── Battery SOC (DC page row 2) ──────────────────────────
  - platform: homeassistant
    id: ha_battery
    entity_id: ${battery_entity}
    on_value:
      then:
        - lambda: |-
            id(g_batt_soc_val) = x;
            if (id(g_batt_slot) == 1) id(update_batt_display).execute();
            id(update_batt_icon_state).execute();
        - if:
            condition:
              lambda: 'return !id(g_demo_mode);'
            then:
              - lvgl.label.update:
                  id: icon_battery
                  text: !lambda |-
                    if (x >= ${batt_thresh_full}) return "\ue1a4";
                    if (x >= ${batt_thresh_5bar}) return "\uebd4";
                    if (x >= ${batt_thresh_4bar}) return "\uebe2";
                    if (x >= ${batt_thresh_3bar}) return "\uebdd";
                    if (x >= ${batt_thresh_2bar}) return "\uebe0";
                    if (x >= ${batt_thresh_1bar}) return "\uebd9";
                    if (x >= ${batt_thresh_alert}) return "\uebdc";
                    return "\ue19c";
                  text_color: !lambda |-
                    if (x >= ${batt_color_green}) return lv_color_hex(0x00FF00);
                    if (x >= ${batt_color_blue}) return lv_color_hex(0x0096FF);
                    if (x >= ${batt_color_yellow}) return lv_color_hex(0xFFFF00);
                    return lv_color_hex(0xFFA500);
              - lvgl.label.update:
                  id: val_battery
                  text: !lambda |-
                    if (x >= 100) return str_sprintf("%.0f%%", x);
                    if (x >= 10)  return str_sprintf("%.1f%%", x);
                    return str_sprintf("%.2f%%", x);
                  text_color: !lambda |-
                    if (x >= ${batt_color_green}) return lv_color_hex(0x00FF00);
                    if (x >= ${batt_color_blue}) return lv_color_hex(0x0096FF);
                    if (x >= ${batt_color_yellow}) return lv_color_hex(0xFFFF00);
                    return lv_color_hex(0xFFA500);

  # ── Battery power (DC page row 3 slot 0) ─────────────────
  - platform: homeassistant
    id: ha_battery_power
    entity_id: ${battery_power_entity}
    on_value:
      then:
        - lambda: |-
            id(g_batt_power_val) = x;
            if (id(g_batt_slot) == 0)
              id(update_batt_display).execute();

  # ── Battery current (positive=charging, negative=discharging)
  - platform: homeassistant
    id: ha_batt_current
    entity_id: ${batt_current_entity}
    on_value:
      then:
        - lambda: |-
            id(g_batt_current_val) = x;
            if (id(g_batt_slot) == 1)
              id(update_batt_display).execute();
            id(update_batt_icon_state).execute();

  # ── SRNE charge limit ─────────────────────────────────────
  - platform: homeassistant
    id: ha_srne_charge_limit
    entity_id: ${srne_charge_limit_entity}
    on_value:
      then:
        - lambda: |-
            id(g_srne_charge_limit_val) = x;
            if (id(g_batt_slot) == 1)
              id(update_batt_display).execute();

  # ── SRNE discharge limit ──────────────────────────────────
  - platform: homeassistant
    id: ha_srne_discharge_limit
    entity_id: ${srne_discharge_limit_entity}
    on_value:
      then:
        - lambda: |-
            id(g_srne_discharge_limit_val) = x;
            if (id(g_batt_slot) == 1)
              id(update_batt_display).execute();

  # ── Battery time estimate sensors (graphable in HA) ───────
  - platform: template
    name: "Battery Hours to Full"
    id: batt_hours_to_full
    unit_of_measurement: "h"
    accuracy_decimals: 1
    state_class: measurement
    update_interval: never

  - platform: template
    name: "Battery Hours to Empty"
    id: batt_hours_to_empty
    unit_of_measurement: "h"
    accuracy_decimals: 1
    state_class: measurement
    update_interval: never

  - platform: template
    name: "Battery Full At"
    id: batt_full_at_min
    unit_of_measurement: "min"
    accuracy_decimals: 0
    state_class: measurement
    update_interval: never

  - platform: template
    name: "Battery Empty At"
    id: batt_empty_at_min
    unit_of_measurement: "min"
    accuracy_decimals: 0
    state_class: measurement
    update_interval: never

# ── Hardware ──────────────────────────────────────────────────
# Display SPI: GPIO14(CLK) / GPIO13(MOSI) / GPIO12(MISO) / GPIO15(CS) / GPIO2(DC)
# Backlight:   GPIO21 (LEDC)
# RGB LED:     GPIO4(R) / GPIO16(G) / GPIO17(B) — common anode, active LOW
spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_output

  # RGB LED (common anode — active LOW): GPIO4=R  GPIO16=G  GPIO17=B
  - platform: ledc
    pin: GPIO4
    id: led_red_output
    inverted: true
  - platform: ledc
    pin: GPIO16
    id: led_green_output
    inverted: true
  - platform: ledc
    pin: GPIO17
    id: led_blue_output
    inverted: true

light:
  - platform: monochromatic
    output: backlight_output
    name: "Display Backlight"
    id: backlight
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0.5s

display:
  - platform: mipi_spi
    model: ILI9341
    id: lcd_display
    spi_id: tft
    cs_pin: GPIO15
    dc_pin: GPIO2
    auto_clear_enabled: false
    update_interval: never
    invert_colors: false
    color_order: BGR
    dimensions:
      width: 240
      height: 320

# ── 1 s State Machine ────────────────────────────────────────
interval:
  - interval: 1s
    then:
      - lambda: |-
          // ── Shared slot cycling timer (DC batt slot + AC A/C slot) ──
          if (--id(g_slot_secs) <= 0) {
            id(g_slot_secs) = (int)id(slot_cycle_secs).state;
            id(advance_batt_slot).execute();
            id(advance_ac_slot).execute();
          }
          // ── Screen transition countdown ───────────────────────────────
          // Paused while doorbell overlay is active — timer still ticks but
          // transition is skipped so the alert is not cut short.
          if (--id(g_screen_secs) <= 0) {
            id(g_screen_secs) = (int)id(screen_transition_secs).state;
            if (id(g_doorbell_active)) {
              // Doorbell showing — skip this transition, let countdown finish
            } else {
              // Find next enabled screen; if all are off fall back to clock (0)
              bool any_en = id(screen_clock_enabled).state ||
                            id(screen_dc_enabled).state   ||
                            id(screen_ac_enabled).state;
              int next;
              if (!any_en) {
                next = 0; // all off → always show clock
              } else {
                next = id(g_screen_idx);
                for (int i = 0; i < 3; i++) {
                  next = (next + 1) % 3;
                  bool en = (next == 0) ? id(screen_clock_enabled).state :
                            (next == 1) ? id(screen_dc_enabled).state :
                                          id(screen_ac_enabled).state;
                  if (en) break;
                }
              }
              id(g_screen_idx) = next;
              lv_obj_t* pages[] = {
                id(clock_page)->obj,
                id(dc_page)->obj,
                id(ac_page)->obj
              };
              auto t = id(screen_transition_style).current_option();
              lv_scr_load_anim_t anim = LV_SCR_LOAD_ANIM_MOVE_LEFT;
              if (t == "Random") {
                switch (esp_random() % 5) {
                  case 0: anim = LV_SCR_LOAD_ANIM_FADE_IN;     break;
                  case 1: anim = LV_SCR_LOAD_ANIM_MOVE_LEFT;   break;
                  case 2: anim = LV_SCR_LOAD_ANIM_MOVE_RIGHT;  break;
                  case 3: anim = LV_SCR_LOAD_ANIM_MOVE_TOP;    break;
                  case 4: anim = LV_SCR_LOAD_ANIM_MOVE_BOTTOM; break;
                }
              } else if (t == "Slide Right") anim = LV_SCR_LOAD_ANIM_MOVE_RIGHT;
              else if   (t == "Slide Up")    anim = LV_SCR_LOAD_ANIM_MOVE_TOP;
              else if   (t == "Slide Down")  anim = LV_SCR_LOAD_ANIM_MOVE_BOTTOM;
              else if   (t == "Fade")        anim = LV_SCR_LOAD_ANIM_FADE_IN;
              lv_scr_load_anim(pages[next], anim, (int)id(screen_anim_ms).state, 0, false);
            }
          }
          // ── Solar: re-evaluate icon when no production (dusk/dawn) ───
          if (id(g_solar_val) <= 0.0f)
            id(update_solar_icon_state).execute();

  # ── Battery SOC + Solar icon animation tick (250 ms) ─────────────────────
  # Battery states: 0=static  1=charging(step up)  2=discharging(step down)  3=alert(flash)
  # Solar states:   0=static(cloudy)  1=sun ping-pong  2=moon cycle
  # All glyph changes use lv_label_set_text_static() — flash pointers, no heap copy.
  - interval: 250ms
    then:
      - lambda: |-
          if (!id(g_lvgl_ready)) return;

          static int s_tick = 0;
          s_tick++;

          // ── Battery icon ─────────────────────────────────────────
          {
            int state = id(g_batt_anim_state);
            if (state == 0) {
              lv_obj_set_style_opa(id(icon_battery), LV_OPA_COVER, 0);
            } else {
              static const char* const BATT_GLYPHS[] = {
                "\ue1a4", "\uebd4", "\uebe2", "\uebdd",
                "\uebe0", "\uebd9", "\uebdc", "\ue19c"
              };
              static const uint32_t BATT_COLORS[] = {
                0x00FF00, 0x00FF00, 0x0096FF, 0x0096FF,
                0xFFFF00, 0xFFFF00, 0xFFA500, 0xFFA500
              };
              if (state == 3) {
                lv_obj_set_style_opa(id(icon_battery),
                  (s_tick & 1) ? LV_OPA_COVER : LV_OPA_TRANSP, 0);
              } else if (s_tick % 4 == 0) {
                float soc = id(g_batt_soc_val);
                // In demo mode force mid-SOC bstart so animation cycles fully
                int bstart = id(g_demo_mode) ? 3 :
                             (soc >= ${batt_thresh_full}) ? 0 : (soc >= ${batt_thresh_5bar}) ? 1 : (soc >= ${batt_thresh_4bar}) ? 2 :
                             (soc >= ${batt_thresh_3bar}) ? 3 : (soc >= ${batt_thresh_2bar}) ? 4 : (soc >= ${batt_thresh_1bar}) ? 5 : 6;
                int bstep = id(g_batt_anim_step);
                if (state == 1) {
                  // Count DOWN toward full (index 0). Clamp reset to ≥2 so
                  // animation always has at least 3 frames even when near-full.
                  if (--bstep < 0) bstep = (bstart > 2) ? bstart : 2;
                } else {
                  // Count UP toward empty (index 6). Clamp reset to ≤4 so
                  // animation always has at least 3 frames even when near-empty.
                  if (++bstep > 6) bstep = (bstart < 4) ? bstart : 4;
                }
                id(g_batt_anim_step) = bstep;
                lv_obj_set_style_opa(id(icon_battery), LV_OPA_COVER, 0);
                lv_label_set_text_static(id(icon_battery), BATT_GLYPHS[bstep]);
                lv_obj_set_style_text_color(id(icon_battery), lv_color_hex(BATT_COLORS[bstep]), 0);
              }
            }
          }

          // ── Solar icon glyph ping-pong ────────────────────────────
          {
            int solar_state = id(g_solar_anim_state);
            if ((solar_state == 1 || solar_state == 2) && s_tick % 8 == 0) {
              if (solar_state == 1) {
                static const char* const SUN_GLYPHS[] = {
                  "\uec0f", "\ue3ac", "\ue3a9", "\ue3ab",
                  "\ue3aa", "\ue3ab", "\ue3a9", "\ue3ac"
                };
                int sstep = (id(g_solar_anim_step) + 1) % 8;
                id(g_solar_anim_step) = sstep;
                lv_label_set_text_static(id(icon_solar), SUN_GLYPHS[sstep]);
                lv_obj_set_style_text_color(id(icon_solar), lv_color_hex(0xFFFF00), 0);
              } else {
                static const char* const MOON_GLYPHS[] = {
                  "\uf174", "\uf34f", "\uf31d", "\ue65f", "\ue3e4"
                };
                int mstep = (id(g_solar_anim_step) + 1) % 5;
                id(g_solar_anim_step) = mstep;
                lv_label_set_text_static(id(icon_solar_moon), MOON_GLYPHS[mstep]);
                lv_obj_set_style_text_color(id(icon_solar_moon), lv_color_hex(0x0096FF), 0);
              }
            }
          }

          // ── Demo mode: cycle solar states cloud→sun→moon every 6 s ──
          if (id(g_demo_mode) && s_tick % 24 == 0) {
            int next = (id(g_solar_anim_state) + 1) % 3;
            id(g_solar_anim_state) = next;
            id(g_solar_anim_step)  = 0;
            if (next == 2) {
              lv_obj_add_flag(id(icon_solar), LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(id(icon_solar_moon), LV_OBJ_FLAG_HIDDEN);
              lv_label_set_text_static(id(icon_solar_moon), "\uf174");
              lv_obj_set_style_text_color(id(icon_solar_moon), lv_color_hex(0x0096FF), 0);
            } else {
              lv_obj_clear_flag(id(icon_solar), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(icon_solar_moon), LV_OBJ_FLAG_HIDDEN);
              if (next == 0) {
                lv_label_set_text_static(id(icon_solar), "\ue42d");  // wb_cloudy
                lv_obj_set_style_text_color(id(icon_solar), lv_color_hex(0x888888), 0);
              } else {
                lv_label_set_text_static(id(icon_solar), "\uec0f");  // solar_power
                lv_obj_set_style_text_color(id(icon_solar), lv_color_hex(0xFFFF00), 0);
              }
            }
          }

          // ── Doorbell alert: flash background + countdown ──────────
          if (id(g_doorbell_active)) {
            static const uint32_t DB_COLORS[] = {
              0xFF0000, 0xFF8800, 0xFFFF00, 0x00FF00,
              0x0088FF, 0x8800FF, 0xFF00FF, 0xFFFFFF
            };
            uint32_t db_col = DB_COLORS[esp_random() % 8];
            lv_obj_set_style_bg_color(id(doorbell_page)->obj, lv_color_hex(db_col), 0);
            lv_obj_invalidate(id(doorbell_page)->obj);
            // Mirror same color on the back RGB LED at max brightness
            if (id(doorbell_led_enabled).state) {
              id(led_red_output).set_level(  ((db_col >> 16) & 0xFF) / 255.0f);
              id(led_green_output).set_level(((db_col >>  8) & 0xFF) / 255.0f);
              id(led_blue_output).set_level( ( db_col        & 0xFF) / 255.0f);
            }
            if (--id(g_doorbell_ticks) <= 0) {
              id(g_doorbell_active) = false;
              ESP_LOGW("doorbell", "Doorbell alert dismissed — restoring brightness to %.0f%%",
                id(g_saved_brightness) * 100.0f);
              // Turn off RGB LED
              id(led_red_output).set_level(0.0f);
              id(led_green_output).set_level(0.0f);
              id(led_blue_output).set_level(0.0f);
              // Restore backlight to saved level
              auto call = id(backlight).make_call();
              call.set_brightness(id(g_saved_brightness));
              call.perform();
              // Return to current rotation screen
              lv_obj_t* pages[] = {
                id(clock_page)->obj, id(dc_page)->obj, id(ac_page)->obj
              };
              lv_scr_load_anim(pages[id(g_screen_idx)], LV_SCR_LOAD_ANIM_NONE, 0, 0, false);
            }
          }

# ── HA Controls ───────────────────────────────────────────────
number:
  - platform: template
    name: "Display Brightness"
    id: display_brightness
    entity_category: config
    min_value: 20
    max_value: 100
    step: 10
    initial_value: 50
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    on_value:
      then:
        - light.turn_on:
            id: backlight
            brightness: !lambda 'return x / 100.0f;'
            transition_length: 300ms

  # Screen transition interval (1–30 s, default 10)
  - platform: template
    name: "Screen Transition"
    id: screen_transition_secs
    entity_category: config
    mode: box
    min_value: 1
    max_value: 30
    step: 1
    initial_value: 10
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    on_value:
      then:
        - lambda: 'id(g_screen_secs) = (int)x;'

  # Screen transition animation duration (ms)
  - platform: template
    name: "Transition Duration"
