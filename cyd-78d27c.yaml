# ── Switch Controls ───────────────────────────────────────────
switch:
  - platform: template
    name: "Batt Time Estimate"
    id: batt_time_enabled
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_off:
      then:
        - lambda: |-
            if (id(g_batt_slot) == 1) {
              id(g_batt_slot) = 0;
              id(update_batt_display).execute();
            }
            float _soc  = id(g_batt_soc_val);
            float _cur  = id(g_batt_current_val);
            float _clim = id(g_srne_charge_limit_val);
            float _dlim = id(g_srne_discharge_limit_val);
            bool _chg = (_cur > 0.5f && _clim > _soc);
            bool _dis = (_cur < -0.5f && _soc > _dlim);
            id(batt_hours_to_full).publish_state(0.0f);
            id(batt_hours_to_empty).publish_state(0.0f);
            id(batt_full_at_min).publish_state(0.0f);
            id(batt_empty_at_min).publish_state(0.0f);
            id(batt_full_at_time).publish_state(
              (_soc >= _clim) ? std::string("Full") :
              _chg ? std::string("Charging") : std::string("Not Charging"));
            id(batt_empty_at_time).publish_state(
              (_soc <= _dlim) ? std::string("At Limit") :
              _dis ? std::string("Discharging") : std::string("Not Discharging"));

  - platform: template
    name: "Batt Log Enabled"
    id: batt_log_enabled
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "Solar Log Enabled"
    id: solar_log_enabled
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  # ── Doorbell alert enable ──────────────────────────────────────
  - platform: template
    name: "Doorbell Enabled"
    id: doorbell_enabled
    entity_category: config
    icon: "mdi:bell-ring-outline"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "Doorbell LED Enabled"
    id: doorbell_led_enabled
    entity_category: config
    icon: "mdi:led-on"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  # ── Daily restart enable ───────────────────────────────────────
  - platform: template
    name: "Daily Restart Enabled"
    id: daily_restart_enabled
    entity_category: config
    icon: "mdi:restart-alert"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  # ── Screen enable toggles ──────────────────────────────────────
  # Turn a screen OFF to skip it during auto-rotation.
  # Safety rule: if ALL three are off the clock screen is shown regardless.
  - platform: template
    name: "Screen Clock Enable"
    id: screen_clock_enabled
    entity_category: config
    icon: "mdi:clock-outline"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "Screen DC Enable"
    id: screen_dc_enabled
    entity_category: config
    icon: "mdi:solar-power"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "Screen AC Enable"
    id: screen_ac_enabled
    entity_category: config
    icon: "mdi:lightning-bolt"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  # ── Layout Preview ─────────────────────────────────────────────
  # Freeze all display slots with max-width placeholder values so you
  # can check alignment on every screen without live data changing.
  # Slot 1 (battery time estimate) is shown so "12:00AM" fits too.
  # Turn OFF to restore live sensor values.
  - platform: template
    name: "Layout Preview"
    id: layout_preview
    entity_category: diagnostic
    icon: "mdi:ruler-square"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - lambda: |-
            if (!id(g_lvgl_ready)) return;
            // ── Seed icon animation states before locking demo mode ──
            // Solar: sun ping-pong (state 1), start at step 0
            id(g_solar_anim_state) = 1;
            id(g_solar_anim_step)  = 0;
            lv_obj_clear_flag(id(icon_solar), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(icon_solar_moon), LV_OBJ_FLAG_HIDDEN);
            lv_label_set_text_static(id(icon_solar), "\uec0f");
            lv_obj_set_style_text_color(id(icon_solar), lv_color_hex(0xFFFF00), 0);
            // Battery: charging step-up (state 1), start at mid-SOC glyph
            id(g_batt_anim_state) = 1;
            id(g_batt_anim_step)  = 3;
            lv_obj_set_style_opa(id(icon_battery), LV_OPA_COVER, 0);
            lv_label_set_text_static(id(icon_battery), "\uebdd");
            lv_obj_set_style_text_color(id(icon_battery), lv_color_hex(0x0096FF), 0);
            // ── Lock demo mode (blocks sensor callbacks from overriding) ──
            id(g_demo_mode) = true;
            // DC page — Row 1: PV Power
            lv_label_set_text(id(val_solar), "8.88kW");
            // DC page — Row 2: Battery SOC
            lv_label_set_text(id(val_battery), "88.8%");
            // DC page — Row 3: slot 1 time estimate (longest format)
            lv_label_set_text(id(lbl_batt_title), "Charges to 88% at");
            lv_label_set_text(id(val_battery_power), "12:00PM");
            // AC page — Row 1: Apparent Power
            lv_label_set_text(id(val_home), "8.88kVA");
            // AC page — Row 2: Ecoflow / Load 1
            lv_label_set_text(id(val_load1), "8.88kW");
            // AC page — Row 3: cycling A/C slot
            lv_label_set_text(id(lbl_ac_slot), "A/C 1st Floor");
            lv_label_set_text(id(val_ac_slot), "8.88kW");
    on_turn_off:
      then:
        - lambda: |-
            id(g_demo_mode) = false;
            if (!id(g_lvgl_ready)) return;
            // Restore PV Solar from cached value
            float sv = id(g_solar_val);
            char sb[16];
            if      (sv >= 1000) snprintf(sb, sizeof(sb), "%.2fkW", sv / 1000.0f);
            else if (sv >= 100)  snprintf(sb, sizeof(sb), "%.0fW", sv);
            else if (sv >= 10)   snprintf(sb, sizeof(sb), "%.1fW", sv);
            else                 snprintf(sb, sizeof(sb), "%.2fW", sv);
            lv_label_set_text(id(val_solar), sb);
            // Restore Battery SOC from cached value
            float bs = id(g_batt_soc_val);
            char bb[16];
            if      (bs >= 100) snprintf(bb, sizeof(bb), "%.0f%%", bs);
            else if (bs >= 10)  snprintf(bb, sizeof(bb), "%.1f%%", bs);
            else                snprintf(bb, sizeof(bb), "%.2f%%", bs);
            lv_label_set_text(id(val_battery), bb);
            // Restore Apparent Power from cached value
            float hv = id(g_home_val);
            char hb[16];
            if      (hv >= 1000) snprintf(hb, sizeof(hb), "%.2fkVA", hv / 1000.0f);
            else if (hv >= 100)  snprintf(hb, sizeof(hb), "%.0fVA", hv);
            else if (hv >= 10)   snprintf(hb, sizeof(hb), "%.1fVA", hv);
            else                 snprintf(hb, sizeof(hb), "%.2fVA", hv);
            lv_label_set_text(id(val_home), hb);
            // Restore Load 1 from cached value
            float l1 = id(g_load1_val);
            char lb[16];
            if      (l1 >= 1000) snprintf(lb, sizeof(lb), "%.2fkW", l1 / 1000.0f);
            else if (l1 >= 100)  snprintf(lb, sizeof(lb), "%.0fW", l1);
            else if (l1 >= 10)   snprintf(lb, sizeof(lb), "%.1fW", l1);
            else                 snprintf(lb, sizeof(lb), "%.2fW", l1);
            lv_label_set_text(id(val_load1), lb);
            // Restore battery power/time slot and AC slot via display scripts
            id(update_batt_display).execute();
            id(update_ac_slot_display).execute();
            id(update_solar_icon_state).execute();
            id(update_batt_icon_state).execute();

# ── Screen Transition Style ───────────────────────────────────
select:
  - platform: template
    name: "Transition Style"
    id: screen_transition_style
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "Random"
    options:
      - "Slide Left"
      - "Slide Right"
      - "Slide Up"
      - "Slide Down"
      - "Fade"
      - "Random"

# ── Text Sensors (battery time estimate — human-readable) ─────
text_sensor:
  # ── Doorbell trigger ────────────────────────────────────────
  # input_button state changes to a new timestamp on every press.
  # on_value fires on each change → triggers the doorbell alert.
  - platform: homeassistant
    id: ha_doorbell
    entity_id: ${doorbell_entity}
    on_value:
      then:
        - lambda: |-
            // On boot / HA-reconnect HA sends two deliveries:
            //   1. "unavailable"  (entity briefly offline)
            //   2. last-pressed timestamp  (entity restored)
            // Both must be absorbed; only a subsequent NEW timestamp is a real press.
            // Rule: if the previous stored state was empty or "unavailable", treat
            // the incoming value as the settled baseline — store it and skip.
            std::string cur = x;
            bool prev_unready = id(g_doorbell_last_state).empty()
                             || id(g_doorbell_last_state) == "unavailable";
            if (cur == "unavailable") {
              // Entity going offline — reset so next real state is treated as baseline
              id(g_doorbell_last_state) = cur;
              ESP_LOGD("doorbell", "State unavailable — reset baseline");
              return;
            }
            if (prev_unready) {
              id(g_doorbell_last_state) = cur;
              ESP_LOGD("doorbell", "Baseline state '%s' — skipped (boot/reconnect)", cur.c_str());
              return;
            }
            if (cur == id(g_doorbell_last_state)) return;  // duplicate delivery, ignore
            id(g_doorbell_last_state) = cur;
            if (!id(doorbell_enabled).state) return;
            if (id(g_doorbell_active)) return;  // ignore while alert is showing
            if (!id(g_lvgl_ready)) return;
            id(g_doorbell_active) = true;
            id(g_doorbell_ticks)  = (int)(id(doorbell_duration_secs).state * 4.0f);
            id(g_saved_brightness) = id(backlight).current_values.get_brightness();
            ESP_LOGW("doorbell", "Doorbell pressed — alert starting (%.0fs, brightness %.0f%%)",
              id(doorbell_duration_secs).state, id(g_saved_brightness) * 100.0f);
            auto call = id(backlight).make_call();
            call.set_brightness(1.0f);
            call.perform();
            // Turn on RGB LED — starts red; 250ms interval takes over immediately
            if (id(doorbell_led_enabled).state) {
              id(led_red_output).set_level(1.0f);
              id(led_green_output).set_level(0.0f);
              id(led_blue_output).set_level(0.0f);
            }
            lv_scr_load_anim(id(doorbell_page)->obj, LV_SCR_LOAD_ANIM_NONE, 0, 0, false);
