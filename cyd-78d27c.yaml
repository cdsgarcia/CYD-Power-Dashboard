# ─────────────────────────────────────────────────────────────────────────────
# cyd-78d27c.yaml — ESPHome config for CYD ESP32 (ILI9341 240×320)
#
# 3-Screen rotating dashboard (landscape 320×240 via LVGL 270° rotation):
#   Screen 0 — Analog Clock          (full-screen, no digital time)
#   Screen 1 — DC Page               (PV Power / Battery SOC / Battery Power+Time)
#   Screen 2 — AC Page               (Apparent Power / Ecoflow / A/C 1F↔3F cycling)
#
# Overlay alert:
#   Doorbell — full-screen flashing alert ("DOOR"/"BELL") triggered by HA button entity.
#              Max brightness for configurable duration, then restores previous brightness.
#
# All screens rotate automatically; transition interval is HA-configurable (1–30 s).
# Daily device restart at a configurable PHT hour (default 3 AM).
# Screens 1 & 2 have three vertically-stacked rows (320×80 each).
#
# ▸ Flash:    esphome run cyd-78d27c.yaml
# ▸ OTA:      esphome upload cyd-78d27c.yaml
# ▸ Validate: esphome config cyd-78d27c.yaml
# ─────────────────────────────────────────────────────────────────────────────
substitutions:
  name: cyd-78d27c
  friendly_name: CYD 78d27c
  # ── Power-flow sensor entity IDs ─────────────────────────────
  solar_entity:                "sensor.srne_pv_power"
  load2_entity:                "sensor.a_c_1f_power_meter_power"
  load3_entity:                "sensor.a_c_3f_power_meter_power"
  load1_entity:                "sensor.ef_r30241_ac_input_power"
  battery_entity:              "sensor.battery_soc_mean"
  home_entity:                 "sensor.srne_load_l1_apparent_power"
  battery_power_entity:        "sensor.total_battery_power"
  batt_current_entity:         "sensor.total_battery_current"
  srne_charge_limit_entity:    "number.srne_batttery_charge_limit"
  srne_discharge_limit_entity: "number.srne_batttery_discharge_limit"
  # ── Doorbell ─────────────────────────────────────────────────
  doorbell_entity:             "input_button.doorbell"
  # ────────────────────────────────────────────────────────────
  #  BATTERY ICON THRESHOLDS — edit here, applies everywhere
  #  Glyph thresholds (SOC %) ─ update_batt_icon_state + 250ms interval
  batt_thresh_alert: "10"   # below this → flashing alert      🟠 Orange
  batt_thresh_1bar:  "30"   # battery_1_bar                    🟡 Yellow
  batt_thresh_2bar:  "50"   # battery_2_bar                    🟡 Yellow
  batt_thresh_3bar:  "65"   # battery_3_bar                    🔵 Blue
  batt_thresh_4bar:  "75"   # battery_4_bar                    🔵 Blue
  batt_thresh_5bar:  "85"   # battery_5_bar                    🟢 Green
  batt_thresh_full:  "97"   # battery_full                     🟢 Green
  #  Color thresholds (SOC %) ─ icon_battery + val_battery
  batt_color_green:  "80"   # ≥ this → 🟢 Green
  batt_color_blue:   "60"   # ≥ this → 🔵 Blue
  batt_color_yellow: "30"   # ≥ this → 🟡 Yellow  (below → 🟠 Orange)
  # ────────────────────────────────────────────────────────────
  #  HOME APPARENT POWER color thresholds (VA)
  home_color_green:  "1000"   # < this → 🟢 Green
  home_color_blue:   "2000"   # < this → 🔵 Blue
  home_color_yellow: "3000"   # < this → 🟡 Yellow  (≥ this → 🟠 Orange)
  # ────────────────────────────────────────────────────────────
  #  LOAD SLOT color thresholds (W) — each load has independent thresholds
  # Load 2 — default: A/C 1st Floor
  load2_color_green:  "600"   # < this → 🟢 Green
  load2_color_blue:   "740"   # < this → 🔵 Blue
  load2_color_yellow: "900"   # < this → 🟡 Yellow  (≥ this → 🟠 Orange)
  # Load 3 — default: A/C 3rd Floor
  load3_color_green:  "80"
  load3_color_blue:   "900"
  load3_color_yellow: "1000"
  # Load 1 — default: Ecoflow River 3
  load1_color_green:  "140"
  load1_color_blue:   "200"
  load1_color_yellow: "400"
  # ────────────────────────────────────────────────────────────
  #  BATTERY POWER color thresholds (W) — slot 0 center display
  #  = 0 W → 🩶 Grey 0x888888 (not charging/discharging — matches cloud icon)
  batt_pwr_green:  "3600"   # ≥ this → 🟢 Green  (fast charge)
  batt_pwr_blue:   "900"    # ≥ this → 🔵 Blue   (moderate charge)
  #  > 0 and < batt_pwr_blue → 🟡 Yellow (slow / trickle charge)
  # ────────────────────────────────────────────────────────────
  #  BATTERY TIME ESTIMATE color thresholds (hours) — slot 1 center display
  #  Charging: close to full = green; far from full = orange
  batt_chg_green_h:  "2"    # < this → 🟢 Green  (almost done)
  batt_chg_blue_h:   "4"    # < this → 🔵 Blue
  batt_chg_yellow_h: "6"    # < this → 🟡 Yellow  (≥ this → 🟠 Orange)
  #  Discharging: close to empty = orange; plenty left = green
  batt_dis_orange_h: "3"    # < this → 🟠 Orange  (almost empty)
  batt_dis_yellow_h: "6"    # < this → 🟡 Yellow
  batt_dis_blue_h:   "9"    # < this → 🔵 Blue    (≥ this → 🟢 Green)
  # ────────────────────────────────────────────────────────────
  #  SOLAR POWER color thresholds (W) — val_solar and sensor on_value
  solar_color_green:  "3600"  # > this → 🟢 Green  (strong production)
  solar_color_blue:   "2000"  # > this → 🔵 Blue   (moderate)
  solar_color_yellow: "900"   # > this → 🟡 Yellow (low)  (≤ this → 🟠 Orange)
  # ────────────────────────────────────────────────────────────

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  on_boot:
    priority: -10
    then:
      - light.turn_on:
          id: backlight
          brightness: !lambda 'return id(display_brightness).state / 100.0f;'
      - lambda: |-
          id(g_lvgl_ready) = true;
          id(g_screen_secs) = (int)id(screen_transition_secs).state;
          id(g_slot_secs) = (int)id(slot_cycle_secs).state;
          id(update_batt_display).execute();
          id(update_ac_slot_display).execute();
          id(update_batt_icon_state).execute();
          id(update_solar_icon_state).execute();

esp32:
  board: esp32dev
  variant: esp32
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

# ── Logging ───────────────────────────────────────────────────
logger:
  level: WARN

# ── Home Assistant API ────────────────────────────────────────
api:

# ── OTA ───────────────────────────────────────────────────────
ota:
  - platform: esphome

# ── WiFi ──────────────────────────────────────────────────────
wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
    - ssid: !secret wifi_ssid2
      password: !secret wifi_password2
  power_save_mode: none
  ap:
    ssid: "cyd-78d27c"
    password: "cyd-78d27c"
  reboot_timeout: 0s

captive_portal:

# ── Globals ───────────────────────────────────────────────────
# Screen cycling:     g_screen_idx / g_screen_secs
# Slot cycling timer: g_slot_secs (shared: DC batt slot + AC A/C slot)
# DC battery slot:    g_batt_slot / g_batt_power_val / g_batt_soc_val /
#                     g_batt_current_val / g_srne_charge_limit_val / g_srne_discharge_limit_val
# AC cycling slot:    g_ac_slot_idx / g_load2_val / g_load3_val
# Battery icon anim:  g_batt_anim_state / g_batt_anim_step
# Solar icon anim:    g_solar_val / g_solar_anim_state / g_solar_anim_step
globals:
  - id: g_lvgl_ready
    type: bool
    initial_value: 'false'
    restore_value: false

  # ── Screen cycling ──────────────────────────────────────────
  - id: g_screen_idx    # 0=clock  1=DC  2=AC
    type: int
    initial_value: '0'
    restore_value: false
  - id: g_screen_secs   # countdown to next screen transition (seconds)
    type: int
    initial_value: '10'  # fallback — on_boot applies NVS-restored screen_transition_secs
    restore_value: false

  # ── Shared slot cycling timer ───────────────────────────────
  - id: g_slot_secs
    type: int
    initial_value: '2'  # fallback — on_boot applies NVS-restored slot_cycle_secs
    restore_value: false

  # ── DC page: Battery Power slot ─────────────────────────────
  - id: g_batt_slot     # 0=Battery Power W   1=Estimated charge/discharge time
    type: int
    initial_value: '0'
    restore_value: false
  - id: g_batt_power_val
    type: float
    restore_value: false
    initial_value: '0'
  - id: g_batt_soc_val
    type: float
    restore_value: false
    initial_value: '50'
  - id: g_batt_current_val
    type: float
    restore_value: false
    initial_value: '0'
  - id: g_srne_charge_limit_val
    type: float
    restore_value: false
    initial_value: '100'
  - id: g_srne_discharge_limit_val
    type: float
    restore_value: false
    initial_value: '20'

  # ── Battery SOC icon animation ──────────────────────────────
  - id: g_batt_anim_state  # 0=static  1=charging  2=discharging  3=alert
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_batt_anim_step   # current glyph index (0=battery_full … 6=battery_0_bar)
    type: int
    restore_value: false
    initial_value: '0'

  # ── Solar icon animation ────────────────────────────────────
  - id: g_solar_val
    type: float
    restore_value: false
    initial_value: '0'
  - id: g_solar_anim_state  # 0=static(cloudy)  1=sun cycle  2=moon cycle
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_solar_anim_step
    type: int
    restore_value: false
    initial_value: '0'

  # ── AC page: cycling A/C slot ───────────────────────────────
  - id: g_ac_slot_idx   # 0=A/C 1F (load2)   1=A/C 3F (load3)
    type: int
    initial_value: '0'
    restore_value: false
  - id: g_load1_val     # cached ${load1_entity} (Ecoflow)
    type: float
    restore_value: false
    initial_value: '0'
  - id: g_load2_val     # cached ${load2_entity} (A/C 1F)
    type: float
    restore_value: false
    initial_value: '0'
  - id: g_load3_val     # cached ${load3_entity} (A/C 3F)
    type: float
    restore_value: false
    initial_value: '0'

  # ── Apparent power cache (used by layout_preview on_turn_off) ─
  - id: g_home_val
    type: float
    restore_value: false
    initial_value: '0'

  # ── Layout preview mode — blocks all live LVGL label updates ──
  - id: g_demo_mode
    type: bool
    restore_value: false
    initial_value: 'false'

  # ── Doorbell overlay alert ───────────────────────────────────
  - id: g_doorbell_active   # true while doorbell page is showing
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: g_doorbell_ticks    # countdown in 250ms ticks
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_saved_brightness  # backlight level saved before alert, restored after
    type: float
    restore_value: false
    initial_value: '0.5'
  - id: g_doorbell_last_state  # last HA state seen; empty = not yet received (skip first delivery)
    type: std::string
    restore_value: false
    initial_value: '""'

script:
  # ── Battery Power/Time Slot Display (DC page row 3) ──────────
  # Slot 0: Battery Power (W / kW).
  # Slot 1: Estimated charge/discharge time — only when within batt_time_threshold_hrs.
  # Falls back to slot 0 if not eligible, time not valid, or batt_time_enabled=OFF.
  # Publishes 6 HA sensors (throttled 60s): hours/minutes-since-midnight/text for full+empty.
  - id: update_batt_display
    then:
      - lambda: |-
          if (!id(g_lvgl_ready)) return;
          if (id(g_demo_mode)) return;
          static bool _first_pub = true;
          static uint32_t _last_pub_ms = 0;
          bool _do_pub = _first_pub || (millis() - _last_pub_ms >= 60000UL);
          if (_do_pub) { _first_pub = false; _last_pub_ms = millis(); }
          float v = id(g_batt_power_val);
          if (id(g_batt_slot) == 1) {
            // ── Slot 1: Estimated Charge/Discharge Time ────────
            float soc     = id(g_batt_soc_val);
            float current = id(g_batt_current_val);
            float cap     = id(battery_capacity_ah).state;
            float clim    = id(g_srne_charge_limit_val);
            float dlim    = id(g_srne_discharge_limit_val);
            float thr     = id(batt_time_threshold_hrs).state;
            bool charging    = current > 0.5f;
            bool discharging = current < -0.5f;
            float hours   = 0;
            bool is_charge = false;
            bool eligible  = false;
            if (charging && clim > soc) {
              hours     = ((clim - soc) / 100.0f * cap) / current;
              is_charge = true;
              eligible  = hours < thr;
            } else if (discharging && soc > dlim) {
              hours     = ((soc - dlim) / 100.0f * cap) / (-current);
              is_charge = false;
              eligible  = hours < thr;
            }
            if (eligible) {
              auto now = id(ha_time).now();
              if (now.is_valid()) {
                time_t pht = now.timestamp + (8 * 3600);
                struct tm pht_tm; gmtime_r(&pht, &pht_tm);
                int total_min = (int)(hours * 60.0f + 0.5f);
                int tgt_min   = pht_tm.tm_min + (total_min % 60);
                int carry     = tgt_min / 60;
                tgt_min      %= 60;
                int tgt_hr    = pht_tm.tm_hour + (total_min / 60) + carry;
                int days      = tgt_hr / 24;
                tgt_hr       %= 24;
                const char* am_pm = (tgt_hr < 12) ? "AM" : "PM";
                int h12 = tgt_hr % 12;
                if (h12 == 0) h12 = 12;
                lv_color_t clr;
                if (is_charge) {
                  if      (hours < ${batt_chg_green_h})  clr = lv_color_hex(0x00FF00);
                  else if (hours < ${batt_chg_blue_h})   clr = lv_color_hex(0x0096FF);
                  else if (hours < ${batt_chg_yellow_h}) clr = lv_color_hex(0xFFFF00);
                  else                                    clr = lv_color_hex(0xFFA500);
                } else {
                  if      (hours < ${batt_dis_orange_h}) clr = lv_color_hex(0xFFA500);
                  else if (hours < ${batt_dis_yellow_h}) clr = lv_color_hex(0xFFFF00);
                  else if (hours < ${batt_dis_blue_h})   clr = lv_color_hex(0x0096FF);
                  else                                    clr = lv_color_hex(0x00FF00);
                }
                int limit_pct = (int)(is_charge ? clim : dlim);
                char action[28];
                snprintf(action, sizeof(action), is_charge ? "Charges to %d%% at" : "Empty to %d%% at", limit_pct);
                char tbuf[48];
                if      (days == 0) snprintf(tbuf, sizeof(tbuf), "%s", action);
                else if (days == 1) snprintf(tbuf, sizeof(tbuf), "%s - Next Day", action);
                else                snprintf(tbuf, sizeof(tbuf), "%s - Next %d Days", action, days);
                lv_label_set_text(id(lbl_batt_title), tbuf);
                char buf[12];
                snprintf(buf, sizeof(buf), "%d:%02d%s", h12, tgt_min, am_pm);
                if (id(batt_log_enabled).state)
                  ESP_LOGW("batt", "Battery %s at %s (%s, %.1fh, SOC %.0f%% → %.0f%%)",
                    is_charge ? "full" : "empty", buf, tbuf, hours,
                    id(g_batt_soc_val),
                    is_charge ? id(g_srne_charge_limit_val) : id(g_srne_discharge_limit_val));
                lv_label_set_text(id(val_battery_power), buf);
                lv_obj_set_style_text_color(id(val_battery_power), clr, 0);
                if (_do_pub) {
                  int min_of_day = tgt_hr * 60 + tgt_min;
                  id(batt_hours_to_full).publish_state(is_charge ? hours : 0.0f);
                  id(batt_hours_to_empty).publish_state(!is_charge ? hours : 0.0f);
                  id(batt_full_at_min).publish_state(is_charge ? (float)min_of_day : 0.0f);
                  id(batt_empty_at_min).publish_state(!is_charge ? (float)min_of_day : 0.0f);
                  id(batt_full_at_time).publish_state(is_charge ? std::string(buf) : std::string("Not Charging"));
                  id(batt_empty_at_time).publish_state(!is_charge ? std::string(buf) : std::string("Not Discharging"));
                }
                return;
              }
              if (id(batt_log_enabled).state)
                ESP_LOGW("batt", "update_batt_display slot1: time not valid, showing Power W");
              id(g_batt_slot) = 0;
            } else {
              if (id(batt_log_enabled).state)
                ESP_LOGW("batt", "update_batt_display slot1 fallback: cur=%.1fA SOC=%.0f%% clim=%.0f%% dlim=%.0f%% hours=%.1f thr=%.0fh",
                  current, soc, clim, dlim, hours, thr);
              id(g_batt_slot) = 0;
            }
          }
          // ── Slot 0 (or slot 1 fallback): Battery Power ─────────────
          lv_label_set_text_static(id(lbl_batt_title), "Battery Power");
          char buf[16];
          if      (v >= 1000 || v <= -1000) snprintf(buf, sizeof(buf), "%.2fkW", v / 1000.0f);
          else if (v >= 100  || v <= -100)  snprintf(buf, sizeof(buf), "%.0fW", v);
          else if (v >= 10   || v <= -10)   snprintf(buf, sizeof(buf), "%.1fW", v);
          else                              snprintf(buf, sizeof(buf), "%.2fW", v);
          lv_label_set_text(id(val_battery_power), buf);
          lv_color_t clr;
          if      (v >= ${batt_pwr_green})  clr = lv_color_hex(0x00FF00);  // fast charge
          else if (v >= ${batt_pwr_blue})   clr = lv_color_hex(0x0096FF);  // moderate charge
          else if (v > 0)                   clr = lv_color_hex(0xFFFF00);  // slow / trickle charge
          else if (v == 0.0f)               clr = lv_color_hex(0x888888);  // not charging/discharging — grey
          else                              clr = lv_color_hex(0xFFA500);  // discharging (any rate)
          lv_obj_set_style_text_color(id(val_battery_power), clr, 0);
          if (_do_pub) {
            float _soc  = id(g_batt_soc_val);
            float _cur  = id(g_batt_current_val);
            float _cap  = id(battery_capacity_ah).state;
            float _clim = id(g_srne_charge_limit_val);
            float _dlim = id(g_srne_discharge_limit_val);
            float _thr  = id(batt_time_threshold_hrs).state;
            bool _chg = (_cur > 0.5f && _clim > _soc);
            bool _dis = (_cur < -0.5f && _soc > _dlim);
            float _hours = 0.0f;
            bool _is_charge = false, _eligible = false;
            if (_chg) {
              _hours = ((_clim - _soc) / 100.0f * _cap) / _cur;
              _is_charge = true; _eligible = (_hours < _thr);
            } else if (_dis) {
              _hours = ((_soc - _dlim) / 100.0f * _cap) / (-_cur);
              _eligible = (_hours < _thr);
            }
            if (_eligible && id(batt_time_enabled).state) {
              auto _now = id(ha_time).now();
              if (_now.is_valid()) {
                time_t _pht = _now.timestamp + (8 * 3600);
                struct tm _tm; gmtime_r(&_pht, &_tm);
                int _total_min = (int)(_hours * 60.0f + 0.5f);
                int _tgt_min = _tm.tm_min + (_total_min % 60);
                int _carry = _tgt_min / 60; _tgt_min %= 60;
                int _tgt_hr = _tm.tm_hour + (_total_min / 60) + _carry; _tgt_hr %= 24;
                const char* _ap = (_tgt_hr < 12) ? "AM" : "PM";
                int _h12 = _tgt_hr % 12; if (_h12 == 0) _h12 = 12;
                int _mod = _tgt_hr * 60 + _tgt_min;
                char _tbuf[12]; snprintf(_tbuf, sizeof(_tbuf), "%d:%02d%s", _h12, _tgt_min, _ap);
                id(batt_hours_to_full).publish_state(_is_charge ? _hours : 0.0f);
                id(batt_hours_to_empty).publish_state(!_is_charge ? _hours : 0.0f);
                id(batt_full_at_min).publish_state(_is_charge ? (float)_mod : 0.0f);
                id(batt_empty_at_min).publish_state(!_is_charge ? (float)_mod : 0.0f);
                id(batt_full_at_time).publish_state(_is_charge ? std::string(_tbuf) : std::string("Not Charging"));
                id(batt_empty_at_time).publish_state(!_is_charge ? std::string(_tbuf) : std::string("Not Discharging"));
                return;
              }
            }
            id(batt_hours_to_full).publish_state(0.0f);
            id(batt_hours_to_empty).publish_state(0.0f);
            id(batt_full_at_min).publish_state(0.0f);
            id(batt_empty_at_min).publish_state(0.0f);
            id(batt_full_at_time).publish_state(
              (_soc >= _clim) ? std::string("Full") :
              _chg ? std::string("Charging") : std::string("Not Charging"));
            id(batt_empty_at_time).publish_state(
              (_soc <= _dlim) ? std::string("At Limit") :
              _dis ? std::string("Discharging") : std::string("Not Discharging"));
          }

  # ── Battery Slot Advance ─────────────────────────────────────
  # Toggles g_batt_slot 0↔1 with eligibility check for slot 1.
  - id: advance_batt_slot
    then:
      - lambda: |-
          int next = 1 - id(g_batt_slot);
          float soc     = id(g_batt_soc_val);
          float current = id(g_batt_current_val);
          float cap     = id(battery_capacity_ah).state;
          float clim    = id(g_srne_charge_limit_val);
          float dlim    = id(g_srne_discharge_limit_val);
          float thr     = id(batt_time_threshold_hrs).state;
          float hours   = -1;
          bool eligible = false;
          if (next == 1) {
            if (!id(batt_time_enabled).state) {
              next = 0;
            } else if (current > 0.5f && clim > soc) {
              hours    = ((clim - soc) / 100.0f * cap) / current;
              eligible = hours < thr;
              if (!eligible) next = 0;
            } else if (current < -0.5f && soc > dlim) {
              hours    = ((soc - dlim) / 100.0f * cap) / (-current);
              eligible = hours < thr;
              if (!eligible) next = 0;
            } else {
              next = 0;
            }
          }
          if (id(batt_log_enabled).state) {
            if (!id(batt_time_enabled).state)
              ESP_LOGW("batt", "advance_batt_slot: disabled — staying at slot 0 (Power W)");
            else if (next == 0 && id(g_batt_slot) == 1)
              ESP_LOGW("batt", "advance_batt_slot: slot1→0 (back to Power W)");
            else
              ESP_LOGW("batt", "advance_batt_slot: cur=%.1fA SOC=%.0f%% clim=%.0f%% dlim=%.0f%% cap=%.0fAh thr=%.0fh → hours=%.1f eligible=%d next_slot=%d",
                current, soc, clim, dlim, cap, thr, hours, (int)eligible, next);
          }
          id(g_batt_slot) = next;
          id(update_batt_display).execute();

  # ── AC Page Slot Display (row 3: A/C 1F ↔ A/C 3F) ────────────
  # Cycling between load2 (A/C 1F) and load3 (A/C 3F).
  - id: update_ac_slot_display
    then:
      - lambda: |-
          if (!id(g_lvgl_ready)) return;
          if (id(g_demo_mode)) return;
          float v = (id(g_ac_slot_idx) == 0) ? id(g_load2_val) : id(g_load3_val);
          const char* lbl = (id(g_ac_slot_idx) == 0) ?
            id(load2_label).state.c_str() :
            id(load3_label).state.c_str();
          lv_label_set_text(id(lbl_ac_slot), lbl);
          float cg = (id(g_ac_slot_idx) == 0) ? ${load2_color_green}  : ${load3_color_green};
          float cb = (id(g_ac_slot_idx) == 0) ? ${load2_color_blue}   : ${load3_color_blue};
          float cy = (id(g_ac_slot_idx) == 0) ? ${load2_color_yellow} : ${load3_color_yellow};
          lv_color_t clr = (v < cg)  ? lv_color_hex(0x00FF00) :
                           (v < cb)  ? lv_color_hex(0x0096FF) :
                           (v < cy)  ? lv_color_hex(0xFFFF00) : lv_color_hex(0xFFA500);
          lv_obj_set_style_text_color(id(icon_ac_slot), clr, 0);
          lv_obj_set_style_text_color(id(val_ac_slot), clr, 0);
          char buf[16];
          if      (v >= 1000) snprintf(buf, sizeof(buf), "%.2fkW", v / 1000.0f);
          else if (v >= 100)  snprintf(buf, sizeof(buf), "%.0fW", v);
          else if (v >= 10)   snprintf(buf, sizeof(buf), "%.1fW", v);
          else                snprintf(buf, sizeof(buf), "%.2fW", v);
          lv_label_set_text(id(val_ac_slot), buf);

  # ── AC Slot Advance ────────────────────────────────────────────
  # Skips A/C 1F (load2) or A/C 3F (load3) if power is at or below their threshold.
  # Both slots are skipped only if both are below threshold — never leaves display empty
  # because update_ac_slot_display handles v=0 gracefully (shows "0.00W").
  - id: advance_ac_slot
    then:
      - lambda: |-
          int next = 1 - id(g_ac_slot_idx);  // toggle 0↔1
          for (int i = 0; i < 2; i++) {
            int c = (next + i) % 2;
            bool ok = (c == 0 && id(g_load2_val) > id(load2_threshold).state) ||
                      (c == 1 && id(g_load3_val) > id(load3_threshold).state);
            if (ok) { id(g_ac_slot_idx) = c; id(update_ac_slot_display).execute(); return; }
          }
          // Both below threshold — keep current slot, just refresh display
          id(update_ac_slot_display).execute();

  # ── Solar Icon Animation State ──────────────────────────────
  # State 0: daytime no production → wb_cloudy, grey, static
  # State 1: producing             → sun ping-pong, yellow
  # State 2: night no production   → moon cycle, blue
  - id: update_solar_icon_state
    then:
      - lambda: |-
          if (!id(g_lvgl_ready)) return;
          if (id(g_demo_mode)) return;

          bool is_night = false;
          int dbg_hour = -1;
          bool time_valid = false;
          auto now_t = id(ha_time).now();
          if (now_t.is_valid()) {
            time_valid = true;
            time_t pht = now_t.timestamp + (8 * 3600);
            struct tm t; gmtime_r(&pht, &t);
            dbg_hour = t.tm_hour;
            is_night = (t.tm_hour >= 18 || t.tm_hour < 6);
          }

          float solar_w = id(g_solar_val);
          int new_state = (solar_w > 0.0f) ? 1 :
                          is_night          ? 2 :
                                             0;

          int prev_state = id(g_solar_anim_state);
          id(g_solar_anim_state) = new_state;
          if (new_state != prev_state)
            id(g_solar_anim_step) = 0;

          if (id(solar_log_enabled).state)
            ESP_LOGW("solar", "solar_icon: solar=%.0fW time_valid=%d PHT_hr=%d is_night=%d prev=%d → new=%d screen=%d",
              solar_w, (int)time_valid, dbg_hour, (int)is_night, prev_state, new_state, id(g_screen_idx));

          if (new_state == 2) {
            lv_obj_add_flag(id(icon_solar), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(icon_solar_moon), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_clear_flag(id(icon_solar), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(icon_solar_moon), LV_OBJ_FLAG_HIDDEN);
          }

          if (new_state != prev_state || new_state == 0) {
            if (new_state == 0) {
              lv_label_set_text_static(id(icon_solar), "\ue42d");
              lv_obj_set_style_text_color(id(icon_solar), lv_color_hex(0x888888), 0);
            } else if (new_state == 1) {
              lv_label_set_text_static(id(icon_solar), "\uec0f");
              lv_obj_set_style_text_color(id(icon_solar), lv_color_hex(0xFFFF00), 0);
            } else {
              lv_label_set_text_static(id(icon_solar_moon), "\uf174");
              lv_obj_set_style_text_color(id(icon_solar_moon), lv_color_hex(0x0096FF), 0);
            }
          }

  # ── Battery SOC Icon Animation State ────────────────────────
  # Priority: SOC <10% → alert flash | discharging → step down | charging → step up | idle → static
  - id: update_batt_icon_state
    then:
      - lambda: |-
          if (!id(g_lvgl_ready)) return;
          if (id(g_demo_mode)) return;
          float soc = id(g_batt_soc_val);
          float cur = id(g_batt_current_val);

          int new_state;
          if      (soc < ${batt_thresh_alert}.0f) new_state = 3;
          else if (cur < -0.5f)  new_state = 2;
          else if (cur >  0.5f)  new_state = 1;
          else                   new_state = 0;

          int start = (soc >= ${batt_thresh_full}) ? 0 : (soc >= ${batt_thresh_5bar}) ? 1 : (soc >= ${batt_thresh_4bar}) ? 2 :
                      (soc >= ${batt_thresh_3bar}) ? 3 : (soc >= ${batt_thresh_2bar}) ? 4 : (soc >= ${batt_thresh_1bar}) ? 5 : 6;

          // Only reset the animation step on a state transition — repeated sensor
          // updates with the same state would otherwise restart the cycle every
          // time and the animation would never complete a full loop.
          if (new_state != id(g_batt_anim_state)) {
            id(g_batt_anim_step)  = start;
            id(g_batt_anim_state) = new_state;
          }

          if (new_state == 0) {
            static const char* const GLYPHS[] = {
              "\ue1a4", "\uebd4", "\uebe2", "\uebdd",
              "\uebe0", "\uebd9", "\uebdc", "\ue19c"
            };
            int idx = start;
            lv_obj_set_style_opa(id(icon_battery), LV_OPA_COVER, 0);
            lv_label_set_text_static(id(icon_battery), GLYPHS[idx]);
            float s = id(g_batt_soc_val);
            uint32_t c = (s >= ${batt_color_green})  ? 0x00FF00 :
                         (s >= ${batt_color_blue})   ? 0x0096FF :
                         (s >= ${batt_color_yellow}) ? 0xFFFF00 : 0xFFA500;
            lv_obj_set_style_text_color(id(icon_battery), lv_color_hex(c), 0);
          }

